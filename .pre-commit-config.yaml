# Run locally with:
#   pip install pre-commit && pre-commit install
# CI runs the same checks via .github/workflows/ci.yml.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: prettier
        name: prettier (frontend)
        entry: bash -c 'cd frontend && npx prettier --check "src/**/*.{ts,vue,json,css}"'
        language: system
        files: ^frontend/src/
        pass_filenames: false

      - id: eslint
        name: eslint (frontend)
        entry: bash -c 'cd frontend && npx eslint --ext .ts,.vue src'
        language: system
        files: ^frontend/src/
        pass_filenames: false
