name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — lint + type + tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps for converters
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            potrace ghostscript libpango-1.0-0 libpangoft2-1.0-0 \
            libharfbuzz0b libcairo2 libffi-dev shared-mime-info

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync deps (with dev extras)
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check pen_plotter tests

      - name: Mypy strict
        run: uv run mypy pen_plotter

      - name: Pytest with coverage
        run: uv run pytest --cov=pen_plotter --cov-report=term-missing --cov-report=xml -q

      - name: Contract drift check (D.5)
        run: uv run python scripts/check_contracts.py

      - name: OpenAPI snapshot drift check
        # Regenerates backend/openapi.json from the live FastAPI app and
        # fails if the committed snapshot is stale. Pairs with the TS
        # types drift check in the frontend job — both must move
        # together when a route or schema changes.
        run: |
          uv run python scripts/generate_openapi.py > openapi.json
          git diff --exit-code -- openapi.json

      - name: Set up Node for manifest snapshot drift check
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Manifest snapshot drift check
        # Regenerates frontend/src/domain/manifests/snapshot.json from
        # the live backend registry and fails if the committed snapshot
        # is stale. Complements check_contracts.py, which validates the
        # snapshot itself but assumes it was refreshed.
        working-directory: frontend
        run: |
          npm ci --no-audit --no-fund --prefer-offline
          npm run gen:manifests
          git diff --exit-code -- src/domain/manifests/snapshot.json

      - name: Smoke perf gate (D.5)
        # Tolerant default — catches catastrophic regressions only.
        run: uv run python scripts/perf_gate.py --runs 5 --warmup 2 --allowed-regression-pct 50

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: ignore

  frontend:
    name: Frontend — lint + type + tests + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Type-check
        run: npx vue-tsc --noEmit

      - name: TS types snapshot drift check
        # Regenerates src/domain/api-types.ts from backend/openapi.json
        # and fails if the committed snapshot is stale. Pairs with the
        # OpenAPI drift check in the backend job.
        run: |
          npm run gen:types
          git diff --exit-code -- src/domain/api-types.ts

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  e2e:
    name: E2E — Playwright (modal V2 smoke)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        # Suite only covers the modal V2 smoke today; expanding to the
        # full operator parcours (import/edit/preflight/generate/queue)
        # is tracked separately and needs a fake-hardware backend mode.
        run: npm run e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore
