<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#22c55e"/>
    </marker>
  </defs>
  <rect width="1200" height="360" fill="url(#bg)"/>

  <text x="600" y="42" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">From drop to plot</text>
  <text x="600" y="64" text-anchor="middle" fill="#94a3b8" font-size="12">Five steps. No CAM nightmare. No vendor lock-in.</text>

  <!-- step boxes -->
  <g font-size="12">
    <g transform="translate(60,110)">
      <rect width="180" height="170" rx="12" fill="#0b1220" stroke="#1e293b"/>
      <circle cx="32" cy="32" r="18" fill="#1e293b" stroke="#475569"/>
      <text x="32" y="37" text-anchor="middle" fill="#f1f5f9" font-weight="700">1</text>
      <text x="60" y="38" fill="#f1f5f9" font-weight="600">Import</text>
      <text x="20" y="80" fill="#cbd5e1">PNG · SVG · PDF</text>
      <text x="20" y="98" fill="#cbd5e1">DOCX · MD · DXF</text>
      <text x="20" y="116" fill="#cbd5e1">EPS · HTML · TXT</text>
      <text x="20" y="146" fill="#94a3b8" font-size="11">drag, drop, paste, URL</text>
    </g>

    <g transform="translate(280,110)">
      <rect width="180" height="170" rx="12" fill="#0b1220" stroke="#1e293b"/>
      <circle cx="32" cy="32" r="18" fill="#1e293b" stroke="#475569"/>
      <text x="32" y="37" text-anchor="middle" fill="#f1f5f9" font-weight="700">2</text>
      <text x="60" y="38" fill="#f1f5f9" font-weight="600">Edit</text>
      <text x="20" y="80" fill="#cbd5e1">Pick algorithm</text>
      <text x="20" y="98" fill="#cbd5e1">Assign pen colours</text>
      <text x="20" y="116" fill="#cbd5e1">Tune density &amp; speed</text>
      <text x="20" y="146" fill="#94a3b8" font-size="11">Assistant wizard or Expert</text>
    </g>

    <g transform="translate(500,110)">
      <rect width="180" height="170" rx="12" fill="#0b1220" stroke="#1e293b"/>
      <circle cx="32" cy="32" r="18" fill="#1e293b" stroke="#475569"/>
      <text x="32" y="37" text-anchor="middle" fill="#f1f5f9" font-weight="700">3</text>
      <text x="60" y="38" fill="#f1f5f9" font-weight="600">Place</text>
      <text x="20" y="80" fill="#cbd5e1">Scale, rotate, fit</text>
      <text x="20" y="98" fill="#cbd5e1">Stack multiple files</text>
      <text x="20" y="116" fill="#cbd5e1">Sheet preview, bounds</text>
      <text x="20" y="146" fill="#94a3b8" font-size="11">snap to A4 / A3 / custom</text>
    </g>

    <g transform="translate(720,110)">
      <rect width="180" height="170" rx="12" fill="#0b1220" stroke="#1e293b"/>
      <circle cx="32" cy="32" r="18" fill="#1e293b" stroke="#475569"/>
      <text x="32" y="37" text-anchor="middle" fill="#f1f5f9" font-weight="700">4</text>
      <text x="60" y="38" fill="#f1f5f9" font-weight="600">Preview</text>
      <text x="20" y="80" fill="#cbd5e1">Pre-flight time / length</text>
      <text x="20" y="98" fill="#cbd5e1">Pen-change count</text>
      <text x="20" y="116" fill="#cbd5e1">Stroke-by-stroke sim</text>
      <text x="20" y="146" fill="#94a3b8" font-size="11">before touching hardware</text>
    </g>

    <g transform="translate(940,110)">
      <rect width="200" height="170" rx="12" fill="#052e16" stroke="#16a34a"/>
      <circle cx="32" cy="32" r="18" fill="#16a34a"/>
      <text x="32" y="37" text-anchor="middle" fill="#052e16" font-weight="700">5</text>
      <text x="62" y="38" fill="#bbf7d0" font-weight="600">Plot</text>
      <text x="20" y="80" fill="#bbf7d0">Streams G-code over USB</text>
      <text x="20" y="98" fill="#bbf7d0">Pause · resume · abort</text>
      <text x="20" y="116" fill="#bbf7d0">Survives reboot</text>
      <text x="20" y="146" fill="#86efac" font-size="11">queue keeps drawing</text>
    </g>

    <!-- arrows -->
    <g stroke="#22c55e" stroke-width="2" fill="none">
      <line x1="240" y1="195" x2="278" y2="195" marker-end="url(#arr)"/>
      <line x1="460" y1="195" x2="498" y2="195" marker-end="url(#arr)"/>
      <line x1="680" y1="195" x2="718" y2="195" marker-end="url(#arr)"/>
      <line x1="900" y1="195" x2="938" y2="195" marker-end="url(#arr)"/>
    </g>
  </g>

  <text x="600" y="328" text-anchor="middle" fill="#64748b" font-size="11">Real-time motion handled by Klipper on an RP2040 — Linux just drives the pipeline.</text>
</svg>
